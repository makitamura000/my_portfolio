<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Redirecting...</title>
<meta http-equiv="refresh" content="0; url=">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
  }
  .wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .msg {
    font-size: 14px;
    letter-spacing: 0.05em;
    opacity: 0.8;
  }
  .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }
  .fallback {
    margin-top: 12px;
    font-size: 12px;
    opacity: 0.5;
  }
  .fallback a {
    color: #58a6ff;
  }
</style>
<script>
  location.replace('https://example.com/new-page');
</script>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <div class="msg">Redirecting<span class="dots"></span></div>
  </div>
</body>
</html>
